name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest --cov=p0ly_utils --cov-report=term-missing
